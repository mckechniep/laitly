<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf9f4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    @media (min-width: 430px) {
      html { background: #e4e2dd; min-height: 100vh; display: flex; justify-content: center; }
      body { width: 390px !important; max-width: 390px !important; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.08); overflow-x: hidden; }
      .fixed { width: 390px !important; left: 50% !important; right: auto !important; transform: translateX(-50%) !important; }

<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fbf9f4] dark:bg-stone-900 fixed top-0 w-full z-50">
<div class="flex items-center justify-between w-full px-6 py-4 max-w-screen-xl mx-auto">
<button class="text-[#635d5a] dark:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors p-2 rounded-full Active:opacity-70 Active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Newsreader'] font-medium text-2xl tracking-tight text-[#635d5a] dark:text-stone-200">Log Entry</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="bg-[#f5f3ee] dark:bg-stone-800 h-px w-full"></div>
</header>
<!-- Main Content -->
<main class="flex-grow mx-auto w-full px-6 py-8 flex flex-col gap-10">
<!-- Amount Section (Editorial Bento Style) -->
<section class="flex flex-col gap-4">
<h2 class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15rem] text-primary/60">Amount</h2>
<div class="relative bg-surface-container-lowest border-l-2 border-secondary-fixed-dim p-10 flex flex-col items-center justify-center rounded-xl shadow-[0_4px_32px_rgba(27,28,25,0.04)]">
<div class="flex items-baseline gap-2">
<span class="font-headline text-7xl font-medium text-primary">4.5</span>
<span class="font-label text-xl font-bold text-secondary-fixed-dim uppercase tracking-widest">oz</span>
</div>
<!-- Quick Stepper Icons -->
<div class="flex gap-12 mt-8">
<button class="w-12 h-12 rounded-full border border-outline-variant/20 flex items-center justify-center text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-12 h-12 rounded-full border border-outline-variant/20 flex items-center justify-center text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</section>
<!-- Time Section (Asymmetric Editorial Style) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-3">
<h2 class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15rem] text-primary/60">Logged At</h2>
<div class="flex items-center gap-3 bg-surface-container-low p-4 rounded-xl border-l-2 border-secondary-fixed-dim">
<span class="material-symbols-outlined text-secondary" data-icon="schedule">schedule</span>
<span class="font-body text-sm font-medium text-primary">Just now</span>
<button class="ml-auto text-primary/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
</div>
<!-- Contextual Tip (Editorial Quote Component) -->
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col justify-center italic text-center">
<p class="font-headline text-primary/80 leading-snug">"Consistent tracking helps establish healthy patterns for your little one."</p>
</div>
</section>
<!-- Notes Section -->
<section class="flex flex-col gap-4">
<h2 class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15rem] text-primary/60">Notes</h2>
<div class="bg-surface-container-lowest border-l-2 border-secondary-fixed-dim rounded-xl p-1 shadow-[0_4px_32px_rgba(27,28,25,0.04)]">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body text-sm p-4 min-h-[120px] resize-none text-primary" placeholder="e.g., Ate well, fussy today..."></textarea>
</div>
</section>
<!-- Large Keypad for Mobile Convenience (Tactile Feel) -->
<section class="grid grid-cols-3 gap-2 mt-4 max-w-sm mx-auto w-full md:hidden">
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">1</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">2</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">3</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">4</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">5</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">6</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">7</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">8</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">9</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">.</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">0</button>
<button class="h-14 flex items-center justify-center bg-surface-container-low rounded-lg font-body font-bold text-lg text-primary hover:bg-primary/5 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</section>
<!-- Primary Action -->
<div class="mt-8 mb-24">
<button class="w-full bg-[#635d5a] bg-gradient-to-r from-[#635d5a] to-[#afa7a3] text-white font-['Manrope'] font-bold text-base py-5 rounded-xl shadow-[0_4px_32px_rgba(27,28,25,0.12)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Log Feeding
            </button>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused task logic as per instructions, but placeholder provided for reference if it were top-level) -->
<!-- Nav is suppressed here because this is a "Task-Focused" screen (Log Entry) -->

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-20 bg-[#fbf9f4]/80 backdrop-blur-xl z-50 border-t border-[#635d5a]/10 shadow-[0_-4px_32px_rgba(27,28,25,0.04)]">
<a class="flex flex-col items-center justify-center text-[#635d5a] opacity-60 hover:text-[#C5A55A] transition-colors active:scale-90" href="home.html">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#C5A55A] scale-110 transition-transform" href="log-feeding.html">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest">Log</span>
</a>
<a class="flex flex-col items-center justify-center text-[#635d5a] opacity-60 hover:text-[#C5A55A] transition-colors active:scale-90" href="guides.html">
<span class="material-symbols-outlined mb-1">auto_stories</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest">Guides</span>
</a>
</nav>
</body></html>
