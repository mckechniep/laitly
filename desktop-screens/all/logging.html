<div class="p-8 md:p-12 space-y-10">

<span class="font-label text-xs font-bold uppercase tracking-[0.15rem] text-primary/60">Journal Entry</span>
<h1 class="font-headline text-4xl text-primary">Log Milk</h1>
</div>

<div class="flex items-baseline gap-2">
<span class="font-headline text-7xl md:text-8xl text-secondary select-none">4.5</span>

</div>
<div class="flex gap-4 mt-6">
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-outline-variant/30 transition-colors">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-outline-variant/30 transition-colors">
<span class="material-symbols-outlined text-primary">add</span>
</button>
</div>

<div class="space-y-4">
<label class="font-label text-[0.75rem] font-bold uppercase tracking-[0.15rem] text-primary/70">Source</label>

</div>

<label class="font-label text-[0.75rem] font-bold uppercase tracking-[0.15rem] text-primary/70">Destination</label>

<button class="flex-1 py-2 text-sm text-primary/60 hover:text-primary transition-colors">Stash</button>

<button class="material-symbols-outlined text-primary/40 hover:text-secondary transition-colors" data-icon="edit">edit</button>
</div>
</div>
